<div class="container mt-5" style="max-width: 560px;">

  <!-- Titre -->
  <h2 class="fw-bold text-primary mb-4">
    <i class="bi bi-check2-square me-2"></i>Ma Todo List
  </h2>

  <!-- Formulaire d'ajout -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <todo-list-form (submitEvent)="onPushEvent($event)"></todo-list-form>
    </div>
  </div>

  <!-- Liste des tâches -->
  <ul class="list-group shadow-sm">
    @for(task of tasks; track $index) {
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <span>
          <i class="bi bi-circle me-2 text-secondary"></i>{{ task }}
        </span>
        <button class="btn btn-outline-danger btn-sm" (click)="onDeleteEvent(task)">
          <i class="bi bi-trash me-1"></i>Supprimer
        </button>
      </li>
    }
  </ul>

  <!-- Message si liste vide -->
  @if(tasks.length === 0) {
    <p class="text-center text-muted mt-4">
      <i class="bi bi-inbox me-1"></i>Aucune tâche pour le moment.
    </p>
  }

</div>
